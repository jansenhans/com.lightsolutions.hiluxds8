<html>
<head>
  <script type="text/javascript" src="/homey.js" data-origin="pair"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 12px; }
    button { padding: 10px 16px; }
    #error { color: #c0392b; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Connect your HiluX DS8</h2>
  <p>Enter the local IP address of your HiluX DS8 light (found in your router, or the LightSolutions/Shelly app under device settings).</p>

  <label for="ip">IP address</label>
  <input id="ip" type="text" placeholder="e.g. 192.168.1.176" />
  <button id="connect">Connect</button>
  <div id="status">Loading script...</div>
  <div id="error"></div>

  <script type="text/javascript">
    document.getElementById('status').textContent = 'Script loaded, waiting for Homey...';

    function onHomeyReady(Homey) {
      const statusEl = document.getElementById('status');
      const errorEl = document.getElementById('error');
      statusEl.textContent = 'Homey ready. Enter an IP and tap Connect.';

      Homey.setTitle('Connect HiluX DS8');

      const button = document.getElementById('connect');

      button.addEventListener('click', async () => {
        errorEl.textContent = '';
        statusEl.textContent = 'Button clicked...';
        const ip = document.getElementById('ip').value.trim();

        if (!ip) {
          errorEl.textContent = 'Please enter an IP address';
          statusEl.textContent = '';
          return;
        }

        button.disabled = true;
        statusEl.textContent = 'Connecting to ' + ip + '...';

        try {
          const device = await Homey.emit('check_device', ip);
          statusEl.textContent = 'Found device, adding...';
          await Homey.createDevice(device);
          await Homey.done();
        } catch (err) {
          statusEl.textContent = '';
          errorEl.textContent = (err && err.message) || 'Could not connect to device';
        } finally {
          button.disabled = false;
        }
      });

      Homey.ready();
    }
  </script>
</body>
</html>
